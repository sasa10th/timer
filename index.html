<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>타이머</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        #timer {
            font-size: 80px;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
            margin: 20px;
        }

        .inputs {
            display: flex;
            gap: 10px;
            margin: 10px;
        }

        .inputs input {
            width: 60px;
            font-size: 20px;
            text-align: center;
        }

        #startBtn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            color: #0f0;
            background-color: #111;
            border: 2px solid #0f0;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #startBtn:hover {
            background-color: #0f0;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="timer">00:00:00</div>

    <div class="inputs">
        <input type="number" id="hours" min="0" placeholder="시">
        <input type="number" id="minutes" min="0" max="59" placeholder="분">
        <input type="number" id="seconds" min="0" max="59" placeholder="초">
    </div>

    <button id="startBtn">START</button>

    <script>
        const timerElement = document.getElementById("timer");
        const startBtn = document.getElementById("startBtn");
        const hoursInput = document.getElementById("hours");
        const minutesInput = document.getElementById("minutes");
        const secondsInput = document.getElementById("seconds");

        let totalSeconds = 0;
        let interval;

        function formatTime(h, m, s) {
            return [
                String(h).padStart(2, '0'),
                String(m).padStart(2, '0'),
                String(s).padStart(2, '0')
            ].join(':');
        }

        startBtn.addEventListener("click", () => {
            clearInterval(interval);

            let hours = parseInt(hoursInput.value) || 0;
            let minutes = parseInt(minutesInput.value) || 0;
            let seconds = parseInt(secondsInput.value) || 0;

            // ✅ 입력값 비우기
            hoursInput.value = "";
            minutesInput.value = "";
            secondsInput.value = "";

            totalSeconds = hours * 3600 + minutes * 60 + seconds;

            if (totalSeconds <= 0) {
                timerElement.textContent = "00:00:00";
                return;
            }

            timerElement.textContent = formatTime(hours, minutes, seconds);

            interval = setInterval(() => {
                totalSeconds--;

                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;

                timerElement.textContent = formatTime(h, m, s);

                if (totalSeconds <= 0) {
                    clearInterval(interval);
                    timerElement.textContent = "END";
                }
            }, 1000);
        });
    </script>


</body>

</html>
